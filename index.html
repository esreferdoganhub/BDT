<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDT Uygulama Sınavı - Dosya Teslim Sistemi</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0a192f;
            --secondary-bg: #112240;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
            --accent: #64ffda;
            --error: #f44336;
            --success: #4caf50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--secondary-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px -15px rgba(2, 12, 27, 0.7);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #233554;
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--accent);
        }

        .file-input-wrapper {
            position: relative;
            margin-top: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-btn {
            display: block;
            background-color: #233554;
            color: var(--accent);
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px dashed var(--accent);
            transition: all 0.3s;
            text-align: center;
        }

        .custom-file-btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        #file-name-display {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-style: italic;
        }

        button#submit-btn {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s;
        }

        button#submit-btn:hover {
            background-color: rgba(100, 255, 218, 0.1);
        }

        button#submit-btn:disabled {
            border-color: var(--text-dim);
            color: var(--text-dim);
            cursor: not-allowed;
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin-top: 25px;
        }

        .progress-bar-bg {
            background-color: #233554;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #112240;
        }

        .progress-bar-fill {
            background-color: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.1s;
        }

        #progress-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--accent);
        }

        /* Success & Error State */
        .status-screen {
            display: none;
            padding: 20px 0;
        }

        .success-icon {
            font-size: 5rem;
            color: var(--success);
            margin-bottom: 20px;
            animation: scaleUp 0.5s ease-out;
        }

        @keyframes scaleUp {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .status-message h2 {
            margin-bottom: 15px;
        }

        .student-info {
            background-color: rgba(100, 255, 218, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            border-left: 4px solid var(--accent);
        }

        .student-info p {
            margin-bottom: 5px;
            font-size: 0.95rem;
        }

        .error-box {
            display: none;
            background-color: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: #ff8a80;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .university-footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-top: 1px solid #233554;
            padding-top: 15px;
        }

        /* Responsive Improvements */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <!-- Başlık -->
        <h1>Çukurova Üniversitesi<br>Elektronik Teknolojisi Programı<br>BDT Dosya Teslim Sistemi</h1>

        <!-- Form -->
        <form id="upload-form">
            <div class="form-group">
                <label for="adSoyad">Ad Soyad</label>
                <input type="text" id="adSoyad" name="adSoyad" required placeholder="Örn: Ahmet Yılmaz">
            </div>

            <div class="form-group">
                <label for="ogrenciNo">Öğrenci Numarası</label>
                <input type="text" id="ogrenciNo" name="ogrenciNo" required pattern="\d+" placeholder="Sadece rakam">
            </div>

            <div class="form-group">
                <label for="ders">Ders Seçimi</label>
                <select id="ders" name="ders" required>
                    <option value="Bilgisayar Destekli Tasarım">Bilgisayar Destekli Tasarım</option>
                    <option value="Programlanabilir Denetleyiciler">Programlanabilir Denetleyiciler</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sinif">Sınıf Seçimi</label>
                <select id="sinif" name="sinif" required>
                    <option value="Elektronik 1">Elektronik 1. Sınıf</option>
                    <option value="Elektronik 2">Elektronik 2. Sınıf</option>
                    <option value="Elektrik 1">Elektrik 1. Sınıf</option>
                    <option value="Elektrik 2">Elektrik 2. Sınıf</option>
                </select>
            </div>

            <div class="form-group">
                <label>Ödev Dosyası (Max 50MB)</label>
                <div class="file-input-wrapper">
                    <label for="dosya" class="custom-file-btn" id="file-label">
                        Dosya Seç (Max 50MB)
                    </label>
                    <input type="file" id="dosya" name="dosya" required>
                    <div id="file-name-display">Henüz dosya seçilmedi</div>
                </div>
            </div>

            <button type="submit" id="submit-btn">DOSYAYI GÖNDER</button>
        </form>

        <!-- Yükleme İlerleme -->
        <div class="progress-container" id="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
            <div id="progress-text">Yükleniyor... %0</div>
        </div>

        <!-- Hata Kutusu -->
        <div class="error-box" id="error-box"></div>

        <!-- Alt Bilgi -->
        <div class="university-footer">
            2026 - Bilgisayar Destekli Tasarım Uygulama Sınavı
        </div>
    </div>

    <!-- Başarı Ekranı -->
    <div class="container" id="success-screen" style="display: none;">
        <div class="success-icon">✓</div>
        <div class="status-message">
            <h2 style="color: var(--success);">Dosyanız Başarıyla Teslim Edildi</h2>
            
            <div class="student-info">
                <p><strong>Öğrenci:</strong> <span id="display-adSoyad"></span></p>
                <p><strong>Numara:</strong> <span id="display-ogrenciNo"></span></p>
                <p><strong>Dosya:</strong> <span id="display-filename"></span></p>
                <p><strong>Sınıf:</strong> <span id="display-sinif"></span></p>
            </div>

            <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 20px;">
                Dosyanız güvenle Google Drive ortamına aktarıldı.
            </p>

            <button id="reset-btn" class="custom-file-btn" style="width: 100%; border-style: solid; font-weight: 600;">
                ÇIKIŞ / YENİ TESLİM
            </button>
        </div>
    </div>

    <script>
        // --- YAPILANDIRMA ---
        const API_URL = "https://89-167-118-215.nip.io"; 
        // --------------------

        const form = document.getElementById('upload-form');
        const fileInput = document.getElementById('dosya');
        const fileNameDisplay = document.getElementById('file-name-display');
        const progressContainer = document.getElementById('progress-container');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const progressText = document.getElementById('progress-text');
        const submitBtn = document.getElementById('submit-btn');
        const errorBox = document.getElementById('error-box');

        const mainContainer = document.getElementById('main-container');
        const successScreen = document.getElementById('success-screen');
        const resetBtn = document.getElementById('reset-btn');

        // Dosya seçilince ismi göster
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileNameDisplay.textContent = `Seçilen Dosya: ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
                errorBox.style.display = 'none';
            }
        });

        // Form Gönderimi (XHR ile Progress Bar)
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const adSoyad = document.getElementById('adSoyad').value.trim();
            const ogrenciNo = document.getElementById('ogrenciNo').value.trim();
            const dersAdi = document.getElementById('ders').value;
            const sinif = document.getElementById('sinif').value;
            const file = fileInput.files[0];

            if (!file) return;

            // Hazırlık
            submitBtn.disabled = true;
            errorBox.style.display = 'none';
            progressContainer.style.display = 'block';
            progressBarFill.style.width = '0%';
            progressText.textContent = "Hazırlanıyor...";

            const formData = new FormData();
            formData.append('adSoyad', adSoyad);
            formData.append('ogrenciNo', ogrenciNo);
            formData.append('dersAdi', dersAdi);
            formData.append('sinif', sinif);
            formData.append('dosya', file);

            const xhr = new XMLHttpRequest();
            
            // İlerleme Takibi
            xhr.upload.onprogress = (event) => {
                if (event.lengthComputable) {
                    const percentComplete = (event.loaded / event.total) * 100;
                    progressBarFill.style.width = percentComplete + '%';
                    progressText.textContent = `Dosya Sunucuya Gönderiliyor: %${Math.round(percentComplete)}`;
                }
            };

            // Drive'a Yükleme Aşaması (Server bekleme süreci)
            xhr.onload = () => {
                if (xhr.status === 200) {
                    const result = JSON.parse(xhr.responseText);
                    showSuccess(adSoyad, ogrenciNo, result.dosyaAdi, result.klasor);
                } else {
                    let errorMsg = "Bağlantı hatası veya sunucu hatası.";
                    try {
                        const err = JSON.parse(xhr.responseText);
                        errorMsg = err.mesaj || errorMsg;
                    } catch(e) {}
                    showError(errorMsg);
                }
            };

            xhr.onerror = () => {
                showError("Sunucuya bağlanılamadı. Lütfen API URL'sini ve sunucu durumunu kontrol edin.");
            };

            xhr.open('POST', `${API_URL}/yukle`, true);
            xhr.send(formData);
        });

        function showSuccess(ad, no, file, kl) {
            mainContainer.style.display = 'none';
            successScreen.style.display = 'block';
            
            document.getElementById('display-adSoyad').textContent = ad;
            document.getElementById('display-ogrenciNo').textContent = no;
            document.getElementById('display-filename').textContent = file;
            document.getElementById('display-sinif').textContent = kl;
        }

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            submitBtn.disabled = false;
            progressContainer.style.display = 'none';
        }

        resetBtn.addEventListener('click', () => {
            form.reset();
            fileNameDisplay.textContent = "Henüz dosya seçilmedi";
            successScreen.style.display = 'none';
            mainContainer.style.display = 'block';
            submitBtn.disabled = false;
            progressContainer.style.display = 'none';
        });
    </script>
</body>
</html>
